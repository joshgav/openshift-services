apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  name: gpu
  namespace: redhat-ods-applications
  annotations:
    opendatahub.io/display-name: gpu
spec:
  identifiers:
  - defaultCount: 2
    displayName: CPU
    identifier: cpu
    minCount: 1
    resourceType: CPU
  - defaultCount: 4Gi
    displayName: Memory
    identifier: memory
    minCount: 2Gi
    resourceType: Memory
  - defaultCount: 1
    displayName: GPU
    identifier: nvidia.com/gpu
    maxCount: 1
    minCount: 1
    resourceType: Accelerator