kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: istio-ingressgateway-passthrough
spec:
  host: istio-ingressgateway.apps.ipi.aws.joshgav.com
  to:
    kind: Service
    name: istio-ingressgateway
    weight: 100
  port:
    targetPort: https
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect